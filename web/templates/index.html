<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuralForge Studio — Financial Brain</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  :root {
    --bg:      #0a0e1a;
    --panel:   #111827;
    --border:  #1f2d45;
    --accent:  #3b82f6;
    --green:   #22c55e;
    --red:     #ef4444;
    --yellow:  #eab308;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --font:    'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  header span { font-size: 12px; color: var(--muted); margin-left: auto; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: calc(100vh - 53px); }

  /* ─── Sidebar ─────────────────────────── */
  .sidebar {
    background: var(--panel); border-right: 1px solid var(--border);
    padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
  }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 13px; width: 100%;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

  .btn {
    padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; letter-spacing: .3px; width: 100%;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-start  { background: var(--accent); color: #fff; }
  .btn-stop   { background: var(--red);    color: #fff; }

  /* ─── Main ────────────────────────────── */
  .main { overflow-y: auto; display: flex; flex-direction: column; gap: 0; }

  .stats-bar {
    display: grid; grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 14px 18px; border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .green { color: var(--green); }
  .red   { color: var(--red);   }
  .blue  { color: var(--accent);}
  .yellow{ color: var(--yellow);}

  .charts-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); flex: 1;
  }
  .chart-card {
    background: var(--panel); padding: 16px;
  }
  .chart-card h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

  .log-panel {
    border-top: 1px solid var(--border); background: var(--panel);
    padding: 12px 16px;
  }
  .log-panel h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  #log-output {
    background: var(--bg); border-radius: 6px; padding: 10px;
    height: 100px; overflow-y: auto; font-family: monospace; font-size: 12px;
    color: var(--green); border: 1px solid var(--border);
  }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700;
  }
  .badge-idle     { background: #1f2d45; color: var(--muted); }
  .badge-training { background: #1d3a5f; color: var(--accent); }
  .badge-done     { background: #14532d; color: var(--green);  }
</style>
</head>
<body>

<header>
  <span>⚡</span>
  <h1>NeuralForge Studio</h1>
  <span id="status-badge" class="badge badge-idle">IDLE</span>
  <span id="gpu-info">—</span>
</header>

<div class="layout">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div>
      <h2>Data</h2>
      <div class="field"><label>Ticker</label><input id="cfg-ticker" value="SPY"/></div>
      <div class="field" style="margin-top:8px"><label>Period</label>
        <select id="cfg-period">
          <option value="1y">1 year</option>
          <option value="2y">2 years</option>
          <option value="5y" selected>5 years</option>
          <option value="10y">10 years</option>
          <option value="max">Max</option>
        </select>
      </div>
      <div class="field" style="margin-top:8px"><label>Window (candles)</label><input id="cfg-window" type="number" value="30"/></div>
      <div class="field" style="margin-top:8px"><label>Forward bars (label)</label><input id="cfg-forward" type="number" value="5"/></div>
      <div class="field" style="margin-top:8px"><label>Signal threshold %</label><input id="cfg-thresh" type="number" step="0.001" value="0.015"/></div>
    </div>

    <div>
      <h2>Model</h2>
      <div class="field"><label>Hidden size</label><input id="cfg-hidden" type="number" value="128"/></div>
      <div class="field" style="margin-top:8px"><label>LSTM layers</label><input id="cfg-layers" type="number" value="2"/></div>
    </div>

    <div>
      <h2>Training</h2>
      <div class="field"><label>Epochs</label><input id="cfg-epochs" type="number" value="30"/></div>
      <div class="field" style="margin-top:8px"><label>Learning rate</label><input id="cfg-lr" type="number" step="0.0001" value="0.0003"/></div>
      <div class="field" style="margin-top:8px"><label>Batch size</label><input id="cfg-batch" type="number" value="64"/></div>
    </div>

    <button class="btn btn-start" onclick="startTraining()">▶ Train Brain</button>
    <button class="btn btn-stop"  onclick="stopTraining()">⏹ Stop</button>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat"><div class="stat-label">Epoch</div><div class="stat-value blue" id="s-epoch">—</div></div>
      <div class="stat"><div class="stat-label">Train Loss</div><div class="stat-value" id="s-tloss">—</div></div>
      <div class="stat"><div class="stat-label">Val Loss</div><div class="stat-value" id="s-vloss">—</div></div>
      <div class="stat"><div class="stat-label">Train Acc</div><div class="stat-value green" id="s-tacc">—</div></div>
      <div class="stat"><div class="stat-label">Val Acc</div><div class="stat-value green" id="s-vacc">—</div></div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card"><h3>Loss Curve</h3><div id="chart-loss" style="height:240px"></div></div>
      <div class="chart-card"><h3>Accuracy</h3><div id="chart-acc"  style="height:240px"></div></div>
      <div class="chart-card"><h3>Learning Rate</h3><div id="chart-lr"   style="height:200px"></div></div>
      <div class="chart-card"><h3>Confusion Matrix</h3><div id="chart-cm"   style="height:200px"></div></div>
    </div>

    <!-- Log -->
    <div class="log-panel">
      <h3>Console</h3>
      <div id="log-output"></div>
    </div>

  </main>
</div>

<script>
const socket = io();

// ─── History buffers ──────────────────────────────────────
let epochs=[], tLoss=[], vLoss=[], tAcc=[], vAcc=[], lrs=[];

// ─── Plotly layout helper ─────────────────────────────────
const layout = (title, yaxis) => ({
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor:  'rgba(0,0,0,0)',
  font: { color: '#e2e8f0', size: 11 },
  margin: { l:40, r:10, t:10, b:30 },
  xaxis: { gridcolor:'#1f2d45', zeroline:false },
  yaxis: { gridcolor:'#1f2d45', zeroline:false, ...yaxis },
  showlegend: true,
  legend: { x:0.01, y:0.99, bgcolor:'rgba(0,0,0,0)' },
});

Plotly.newPlot('chart-loss', [
  { x:[], y:[], name:'Train', line:{color:'#3b82f6'} },
  { x:[], y:[], name:'Val',   line:{color:'#f97316', dash:'dash'} },
], layout(), {responsive:true, displayModeBar:false});

Plotly.newPlot('chart-acc', [
  { x:[], y:[], name:'Train', line:{color:'#22c55e'} },
  { x:[], y:[], name:'Val',   line:{color:'#a78bfa', dash:'dash'} },
], layout('', {tickformat:'.0%'}), {responsive:true, displayModeBar:false});

Plotly.newPlot('chart-lr', [
  { x:[], y:[], name:'LR', line:{color:'#eab308'}, fill:'tozeroy', fillcolor:'rgba(234,179,8,.15)' },
], layout('', {exponentformat:'e'}), {responsive:true, displayModeBar:false});

// ─── Socket events ────────────────────────────────────────
socket.on('epoch_metrics', m => {
  epochs.push(m.epoch); tLoss.push(m.train_loss); vLoss.push(m.val_loss);
  tAcc.push(m.train_acc); vAcc.push(m.val_acc); lrs.push(m.lr);

  document.getElementById('s-epoch').textContent = m.epoch;
  document.getElementById('s-tloss').textContent = m.train_loss.toFixed(4);
  document.getElementById('s-vloss').textContent = m.val_loss.toFixed(4);
  document.getElementById('s-tacc').textContent  = (m.train_acc*100).toFixed(1)+'%';
  document.getElementById('s-vacc').textContent  = (m.val_acc*100).toFixed(1)+'%';

  Plotly.update('chart-loss', {'x':[epochs,epochs], 'y':[tLoss,vLoss]});
  Plotly.update('chart-acc',  {'x':[epochs,epochs], 'y':[tAcc, vAcc]});
  Plotly.update('chart-lr',   {'x':[lrs.map((_,i)=>i+1)], 'y':[lrs]});
});

socket.on('training_complete', data => {
  document.getElementById('status-badge').className = 'badge badge-done';
  document.getElementById('status-badge').textContent = 'DONE';
  log('Training complete!');

  const cm = data.confusion_matrix;
  const labels = ['BUY','HOLD','SELL'];
  Plotly.newPlot('chart-cm', [{
    z: cm, x: labels, y: labels,
    type:'heatmap', colorscale:'Blues',
    text: cm.map(row=>row.map(v=>v.toString())),
    texttemplate:'%{text}', showscale:false,
  }], {
    paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
    font:{color:'#e2e8f0',size:11},
    margin:{l:50,r:10,t:10,b:40},
    xaxis:{title:'Predicted'}, yaxis:{title:'Actual', autorange:'reversed'},
  }, {responsive:true, displayModeBar:false});

  const r = data.report;
  ['BUY','HOLD','SELL'].forEach(cls => {
    const c = r[cls];
    if (c) log(`${cls}: precision=${c.precision.toFixed(3)} recall=${c.recall.toFixed(3)} f1=${c['f1-score'].toFixed(3)}`);
  });
});

socket.on('log',   d => log(d.msg));
socket.on('error', d => log('ERROR: ' + d.msg));

function log(msg) {
  const el = document.getElementById('log-output');
  el.textContent += '\n> ' + msg;
  el.scrollTop = el.scrollHeight;
}

// ─── Controls ─────────────────────────────────────────────
function startTraining() {
  epochs=[]; tLoss=[]; vLoss=[]; tAcc=[]; vAcc=[]; lrs=[];
  Plotly.update('chart-loss', {'x':[[],[]], 'y':[[],[]]});
  Plotly.update('chart-acc',  {'x':[[],[]], 'y':[[],[]]});
  Plotly.update('chart-lr',   {'x':[[]], 'y':[[]]});

  document.getElementById('status-badge').className = 'badge badge-training';
  document.getElementById('status-badge').textContent = 'TRAINING';

  socket.emit('start_training', {
    ticker:  document.getElementById('cfg-ticker').value,
    period:  document.getElementById('cfg-period').value,
    window:  document.getElementById('cfg-window').value,
    forward: document.getElementById('cfg-forward').value,
    thresh:  document.getElementById('cfg-thresh').value,
    epochs:  document.getElementById('cfg-epochs').value,
    lr:      document.getElementById('cfg-lr').value,
    batch:   document.getElementById('cfg-batch').value,
    hidden:  document.getElementById('cfg-hidden').value,
    layers:  document.getElementById('cfg-layers').value,
  });
}

function stopTraining() {
  socket.emit('stop_training');
}

// ─── GPU info ─────────────────────────────────────────────
fetch('/api/status').then(r=>r.json()).then(d => {
  if (d.history && d.history.length) {
    d.history.forEach(m => {
      epochs.push(m.epoch); tLoss.push(m.train_loss); vLoss.push(m.val_loss);
      tAcc.push(m.train_acc); vAcc.push(m.val_acc); lrs.push(m.lr);
    });
    Plotly.update('chart-loss', {'x':[epochs,epochs], 'y':[tLoss,vLoss]});
    Plotly.update('chart-acc',  {'x':[epochs,epochs], 'y':[tAcc, vAcc]});
    Plotly.update('chart-lr',   {'x':[lrs.map((_,i)=>i+1)], 'y':[lrs]});
    const last = d.history[d.history.length-1];
    document.getElementById('s-epoch').textContent = last.epoch;
    document.getElementById('s-vacc').textContent  = (last.val_acc*100).toFixed(1)+'%';
  }
});
</script>
</body>
</html>
